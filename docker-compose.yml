version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: financial_news
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  api:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - chromadb
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres_data:
  chroma_data:
